<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV. Toni Rianto</title>
  <link rel="stylesheet" type="text/css" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
</head>
<body>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      user-select: none;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* penting supaya proporsi tetap */
      pointer-events: none; /* cegah klik kanan */
    }

    /* Optional: supaya tidak bisa di zoom */
    body {
      touch-action: manipulation;
    }
  </style>
</head>

<body oncontextmenu="return false">
  <div class="container">
    <img src="CV.jpg" alt="CV Toni">
  </div>
</body>
</html>
